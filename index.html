<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Surprise ❤️</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    overflow: hidden;
    color: white;
}

.container {
    margin-top: 100px;
}

input, select {
    padding: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
}

#yesBtn {
    background-color: #28a745;
    color: white;
}

#noBtn {
    background-color: #dc3545;
    color: white;
    position: absolute;
}
</style>
</head>

<body>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="container" id="nameSection">
    <h1>Hey Beautiful 💖</h1>
    <p>Enter your name first 😊</p>
    <input type="text" id="herName" placeholder="Your Name">
    <br><br>
    <button onclick="startQuestion()">Continue 💌</button>
</div>

<div class="container" id="questionSection" style="display:none;">
    <h1 id="questionText"></h1>
    <button id="yesBtn" onclick="showDateSection()">Yes 😍</button>
    <button id="noBtn" onclick="changeText()" onmouseover="moveButton()">No 😜</button>
</div>

<div class="container" id="dateSection" style="display:none;">
    <h1 id="dateText"></h1>
    <p>Select our special date 💕</p>
    <select id="dateSelect">
        <option>Saturday, 7th February ❤️</option>
        <option>Sunday, 8th February</option>
        <option>Friday, 6th February</option>
    </select>
    <br><br>
    <button onclick="finalMessage()">Confirm Date 💘</button>
</div>

<script>
var girlName = "";

function startQuestion() {
    girlName = document.getElementById("herName").value;

    if(girlName === "") {
        alert("Please enter your name 😊");
        return;
    }

    document.getElementById("nameSection").style.display = "none";
    document.getElementById("questionSection").style.display = "block";
    document.getElementById("questionText").innerHTML =
        girlName + ", will you go on a date with me? 💖";
}

function showDateSection() {
    document.getElementById("questionSection").style.display = "none";
    document.getElementById("dateSection").style.display = "block";
    document.getElementById("dateText").innerHTML =
        "Yayyy ❤️ " + girlName + ", choose our special date 💕";
}

function finalMessage() {
    var selectedDate = document.getElementById("dateSelect").value;

    document.body.innerHTML =
    "<h1 style='margin-top:150px;'>❤️ It's a Date ❤️<br><br>" +
    girlName + ", see you on <br><br><b>" +
    selectedDate +
    "</b> 😘💍</h1>";
}

function moveButton() {
    var button = document.getElementById("noBtn");
    var x = Math.random() * (window.innerWidth - 100);
    var y = Math.random() * (window.innerHeight - 50);
    button.style.left = x + "px";
    button.style.top = y + "px";
}

function changeText() {
    document.getElementById("questionText").innerHTML =
        girlName + ", please say Yes 🥺❤️";
}
</script>

</body>
</html>
